name: Deploy

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Execute SSH Commands on VPS
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_IP }}
                  username: deployHelper
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      # 1. Network Diagnostics
                      echo "--- Diagnostic: Testing Host DNS ---"
                      getent hosts google.com || echo "Host DNS Failed"

                      echo "--- Diagnostic: Testing Docker Container DNS ---"
                      docker run --rm alpine nslookup bbuseruploads.s3.amazonaws.com || echo "Container DNS Failed"

                      # 2. Repo Update
                      if [ ! -d "$HOME/nicholasgarcia.com" ]; then
                        git clone https://github.com/${{ github.repository }}.git "$HOME/nicholasgarcia.com"
                      fi
                      cd "$HOME/nicholasgarcia.com"
                      git fetch origin main
                      git reset --hard origin/main

                      # 3. Build with Network Host (Workaround for DNS issues)
                      echo "--- Starting Build ---"
                      docker compose down --remove-orphans
                      docker compose build --no-cache --pull
                      docker compose up -d --force-recreate
